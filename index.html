<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой аккаунт Max</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,0,100,0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .container {
            background: rgba(20, 20, 40, 0.9);
            border: 2px solid rgba(255, 0, 100, 0.5);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            z-index: 1;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(255, 0, 100, 0.3);
            max-width: 400px;
            width: 90%;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #ff0066, #ff4444);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .title {
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .btn {
            display: inline-block;
            padding: 18px 50px;
            background: linear-gradient(45deg, #ff0066, #ff4444);
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 0, 100, 0.5);
            position: relative;
            overflow: hidden;
            letter-spacing: 2px;
        }
        
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255, 0, 100, 0.8);
            background: linear-gradient(45deg, #ff1177, #ff5555);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        
        @keyframes shine {
            0% { left: -50%; }
            100% { left: 150%; }
        }
        
        .footer {
            color: #555;
            font-size: 11px;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">👤</div>
        <div class="title">МОЙ АККАУНТ</div>
        <div class="subtitle">Нажми на кнопку чтобы открыть профиль в Max</div>
        
        <a href="https://max.ru/u/f9LHodD0cOIuHPBgteW8V2ELdOYSY146k5iDpwaFLsxKI_MSCkko5yfXYnE" class="btn" target="_blank">
            🔥 ОТКРЫТЬ
        </a>
        
        <div class="footer">by Swill Way</div>
    </div>
</body>
</html>
