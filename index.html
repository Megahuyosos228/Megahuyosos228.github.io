<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт Bogdan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0b1a, #1a1a2e);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .card {
            background: #1f1f3a;
            padding: 48px 32px;
            border-radius: 48px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            border: 1px solid #3a3a66;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .card h1 {
            font-size: 36px;
            margin: 0 0 16px 0;
            background: linear-gradient(90deg, #f7c948, #e94560);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card p {
            font-size: 18px;
            color: #b0b8d0;
            margin: 12px 0;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #e94560;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 20px;
            border: 1px solid #ff6b85;
            transition: 0.2s;
            box-shadow: 0 6px 0 #a12a44;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #a12a44;
        }
        .btn:hover {
            background: #ff6b85;
        }
        .divider {
            border-top: 1px solid #2a2a4a;
            margin: 28px 0 20px 0;
        }
        .note {
            font-size: 15px;
            color: #8892b0;
        }
        .note a {
            color: #f7c948;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 Bogdan</h1>

        <p>
            Если хочешь, чтобы я <strong>создал для тебя сайт</strong> или <strong>научил делать их сам</strong> — просто нажми на кнопку ниже.
        </p>

        <a class="btn" href="https://max.ru/u/f9LHodD0cOJkY4TKqcjZbmoaMPNbL_3rrikgTN9LH0MpwOm1EfTMP5m5DQY" target="_blank">
            💬 Написать в MAX
        </a>

        <div class="divider"></div>

        <div class="note">
            Кнопка ведёт прямо в мой <a href="https://max.ru/u/f9LHodD0cOJkY4TKqcjZbmoaMPNbL_3rrikgTN9LH0MpwOm1EfTMP5m5DQY" target="_blank">MAX</a>.
            <br>Без лишних шагов — просто нажал и написал.
        </div>
    </div>
</body>
</html>
