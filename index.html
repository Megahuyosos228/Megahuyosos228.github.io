<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АХИ</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #0b0b0b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }
        .container {
            background: #1c1c1e;
            padding: 60px 40px;
            border-radius: 48px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 0, 100, 0.4);
        }
        .btn {
            display: block;
            background: linear-gradient(135deg, #ff0066, #ff3399);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            padding: 24px 48px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-decoration: none;
            width: 100%;
        }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
<div class="container">
    <a href="#" class="btn" id="goBtn">🚀 НАЖМИ</a>
</div>

<script>
    document.getElementById('goBtn').addEventListener('click', function(e) {
        e.preventDefault();

        // ПРЯМАЯ ССЫЛКА НА ЗВУК (замени на свою)
        const audio = new Audio('https://cdn.freesound.org/previews/230/230309_3099776-lq.mp3');
        audio.volume = 1.0;
        audio.play();

        setTimeout(() => {
            window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
        }, 300);
    });
</script>
</body>
</html>
